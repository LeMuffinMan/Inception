<!doctype html>
<html>
    <head>
        <title>The page you were looking for doesn't exist (404)</title>
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <script src="https://code.jquery.com/jquery-2.1.1.min.js"></script>
        <style>
            body {
                background-image: url('votre-image.jpg'); 
                background-size: cover;
                background-repeat: no-repeat;
                background-attachment: fixed;
                background-position: center;
            
                color: #00bbbd;
                text-align: center;
                font-family: arial, sans-serif;
                margin: 0;
            }

            .logo {
                position: absolute;
                left: 0;
                top: 0;
                width: 40px;
                height: auto;
                padding: 5px;
            }

            .title {
                position: relative;
                margin: 60px auto;
            }

            .main-image {
                position: absolute;
                top: 25px;
                background-color: rgba(0, 0, 0, 0.5);
                bottom: 35px;
                left: 82px;
                margin: auto;
                right: 82px;
                background-repeat: no-repeat;
                background-position: 50% 50%;
                background-size: auto 85%;
            }

            .screen {
                position: relative;
                width: 700px;
                margin: auto;
            }

            h1 {
                font-weight: normal;
                margin: 50px auto;
                color: #00ff00;
            }

            h2 {
                font-weight: normal;
                margin: 50px auto;
            }
        </style>
    </head>

    <body>
        <div class="logo"><img src="/images/420_logo.png" alt="logo" /></div>
        <div class="title"><img src="/images/404.png" alt="" /></div>
        <div class="screen">
            <div class="main-image"></div>
            <img src="/images/macbook.png" alt="" />
        </div>
        <h1>Seems like your page doesn't exist anymore !</h1>
        <script>
            $(document).ready(function () {
                var image =
                    "/images/" +
                    (Math.floor((Math.random() * 100) % 4) + 1) +
                    "-sorry.gif";
                $(".main-image").css("background-image", "url(" + image + ")");
            });
        </script>
    </body>
</html>
