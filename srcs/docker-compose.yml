services:
  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    environment:
      WORDPRESS_REDIS_HOST: redis
    secrets:
      - db_password
      - mysql_user
      - wp_admin_user
      - wp_admin_password
      - wp_user
      - wp_user_password
      - mysql_admin_email
      - mysql_user_email
    env_file:
      - .env
    depends_on:
      mariadb:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
    healthcheck:
      test: ["CMD", "pgrep", "php-fpm83"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: on-failure
    volumes:
      - type: volume
        source: wordpress_data
        target: /var/www/html
    networks:
      - inception
  mariadb:
    secrets:
      - db_password
      - db_root_password
      - mysql_user
    container_name: mariadb
    build: ./requirements/mariadb
    # pas tout lui donner !
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 3s
      timeout: 10s
      retries: 10
      start_period: 10s
    restart: on-failure
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
  nginx:
    container_name: nginx
    build: ./requirements/nginx
    env_file:
      - .env
    ports:
      - 443:443
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "--no-check-certificate",
          "https://localhost:443",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      wordpress:
        condition: service_healthy
        restart: true
    restart: on-failure
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception

  redis:
    container_name: redis
    build: ./requirements/bonus/redis
    # fix 1:C 24 Mar 2026 17:12:02.252 # WARNING Memory overcommit must be enabled! Without it, a background save or replication may fail under low memory condition. To fix this issue add 'vm.overcommit_memory = 1' to /etc/sysctl.conf and then reboot or run the command 'sysctl vm.overcommit_memory=1' for this to take effect.
    # net.core.somaxconn : change queue size for accpet() up to 511 instead of default lower value
    # sysctl:
    #   - vm.overcommit_memory=1
    #   - net.core.somaxconn=511
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: on-failure
    networks:
      - inception

  adminer:
    container_name: adminer
    build: ./requirements/bonus/adminer
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    depends_on:
      mariadb:
        condition: service_healthy
        restart: true
    restart: on-failure
    networks:
      - inception

  vsftpd:
    container_name: vsftpd
    build: ./requirements/bonus/vsftpd
    secrets:
      - ftp_user
      - ftp_pass
    depends_on:
      wordpress:
        condition: service_healthy
        restart: true
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/21"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: on-failure
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception

networks:
  inception:
    driver: bridge

volumes:
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ~/data/wordpress
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ~/data/mysql

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_admin_user:
    file: ../secrets/wp_admin_user.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user:
    file: ../secrets/wp_user.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt
  mysql_user:
    file: ../secrets/mysql_user.txt
  mysql_admin_email:
    file: ../secrets/mysql_admin_email.txt
  mysql_user_email:
    file: ../secrets/mysql_user_email.txt
  ftp_user:
    file: ../secrets/ftp_user.txt
  ftp_pass:
    file: ../secrets/ftp_pass.txt
