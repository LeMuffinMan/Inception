services:
  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    secrets:
      - db_password
      - mysql_user
      - wp_admin_user
      - wp_admin_password
      - wp_user
      - wp_user_password
      - mysql_admin_email
      - mysql_user_email
    env_file:
      - .env
    volumes:
      - type: volume
        source: wordpress_data
        target: /var/www/html
    networks:
      - inception
    depends_on:
      mariadb:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
    restart: on-failure
  mariadb:
    secrets:
      - db_password
      - db_root_password
      - mysql_user
    container_name: mariadb
    build: ./requirements/mariadb
    env_file:
      - .env
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: on-failure
  nginx:
    container_name: nginx
    build: ./requirements/nginx
    env_file:
      - .env
    ports:
      - 443:443
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "--no-check-certificate",
          "https://localhost:443",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception
    depends_on:
      wordpress:
        condition: service_healthy
        restart: true
    restart: on-failure

  redis:
    container_name: redis
    build: ./requirements/bonus/redis
    restart: on-failure
    networks:
      - inception

  adminer:
    container_name: adminer
    build: ./requirements/bonus/adminer
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      mariadb:
        condition: service_healthy
        restart: true
    restart: on-failure
    networks:
      - inception

  vsftpd:
    container_name: vsftpd
    build: ./requirements/bonus/vsftpd
    secrets:
      - ftp_user
      - ftp_pass
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception
    depends_on:
      wordpress:
        condition: service_healthy
        restart: true
    healthcheck:
      test:
        [
          "CMD",
          "lftp",
          "-u",
          "user,password",
          "-e",
          "quit",
          "ftps://localhost || exit 1",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: on-failure

networks:
  inception:
    driver: bridge

volumes:
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ~/data/wordpress
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ~/data/mysql

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_admin_user:
    file: ../secrets/wp_admin_user.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user:
    file: ../secrets/wp_user.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt
  mysql_user:
    file: ../secrets/mysql_user.txt
  mysql_admin_email:
    file: ../secrets/mysql_admin_email.txt
  mysql_user_email:
    file: ../secrets/mysql_user_email.txt
  ftp_user:
    file: ../secrets/ftp_user.txt
  ftp_pass:
    file: ../secrets/ftp_pass.txt
