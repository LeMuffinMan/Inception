secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_admin_user:
    file: ../secrets/wp_admin_user.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user:
    file: ../secrets/wp_user.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt

services:
  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    secrets:
      - db_password
      - wp_admin_user
      - wp_admin_password
      - wp_user
      - wp_user_password
    env_file:
      - .env
    volumes:
      - type: volume
        source: wordpress-data
        target: /var/www/html
    networks:
      - inception
    depends_on:
      mariadb:
        condition: service_healthy
    restart: on-failure
  mariadb:
    secrets:
      - db_password
      - db_root_password
    container_name: mariadb
    build: ./requirements/mariadb
    env_file:
      - .env
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
    ports:
      - "3306:3306"
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "--password=$(cat /run/secrets/db_root_password)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: on-failure # on-failure restart only if it crash with a exit code != 0
  nginx:
    container_name: nginx
    build: ./requirements/nginx
    ports:
      - 443:443
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "--no-check-certificate",
          "https://localhost:443",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - wordpress-data:/var/www/html
    networks:
      - inception
    depends_on:
      - wordpress
    restart: on-failure # on-failure restart only if it crash with a exit code != 0

networks:
  inception:
    driver: bridge

#virer les binds ?
volumes:
  wordpress-data:
    driver: local
    driver_opts:
      type: none
      device: ~/data/wordpress
      o: bind
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ~/data/mysql
