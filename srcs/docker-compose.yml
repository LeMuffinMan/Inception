services:
  # ------------- Madatory services ------------------
  nginx:
    container_name: nginx
    build: ./requirements/nginx
    # pas tout lui donner !
    env_file:
      - .env
    ports:
      - 443:443
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "--no-check-certificate",
          "https://localhost:443",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      wordpress:
        condition: service_healthy
        restart: true
    restart: on-failure
    volumes:
      - wordpress_data:/var/www/html
      - hugo_data:/var/www/html/muffin_site
      - chessgame_data:/var/www/html/chessgame
    networks:
      - inception

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    environment:
      - WORDPRESS_REDIS_HOST=redis
      - WP_USER=${WP_USER}
      - WP_ADMIN_USER=${WP_ADMIN_USER}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_USER_EMAIL=${MYSQL_USER_EMAIL}
      - MYSQL_ADMIN_EMAIL=${MYSQL_ADMIN_EMAIL}
      - WP_TITLE=${WP_TITLE}
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password
    depends_on:
      mariadb:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
    healthcheck:
      test: ["CMD", "pgrep", "php-fpm83"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: on-failure
    volumes:
      - type: volume
        source: wordpress_data
        target: /var/www/html
    networks:
      - inception

  mariadb:
    environment:
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    secrets:
      - db_password
      - db_root_password
    container_name: mariadb
    build: ./requirements/mariadb
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 3s
      timeout: 10s
      retries: 10
      start_period: 10s
    restart: on-failure
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception

  # ------------- Bonus services ------------------
  redis:
    container_name: redis
    build: ./requirements/bonus/redis
    # fix 1:C 24 Mar 2026 17:12:02.252 # WARNING Memory overcommit must be enabled! Without it, a background save or replication may fail under low memory condition. To fix this issue add 'vm.overcommit_memory = 1' to /etc/sysctl.conf and then reboot or run the command 'sysctl vm.overcommit_memory=1' for this to take effect.
    # net.core.somaxconn : change queue size for accpet() up to 511 instead of default lower value
    # sysctl:
    #   - vm.overcommit_memory=1
    #   - net.core.somaxconn=511
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: on-failure
    networks:
      - inception

  adminer:
    container_name: adminer
    build: ./requirements/bonus/adminer
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    depends_on:
      mariadb:
        condition: service_healthy
        restart: true
    restart: on-failure
    networks:
      - inception

  vsftpd:
    container_name: vsftpd
    build: ./requirements/bonus/vsftpd
    environment:
      - FTP_USER=${FTP_USER}
    secrets:
      - ftp_pass
    ports:
      - 21:21
      - 21100-21110:21100-21110
    depends_on:
      wordpress:
        condition: service_healthy
        restart: true
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "21"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: on-failure
    volumes:
      - type: volume
        source: wordpress_data
        target: /home/oelleaum/ftp/
    networks:
      - inception

  hugo:
    container_name: hugo
    build: ./requirements/bonus/hugo
    environment:
      - DOMAIN=${DOMAIN_NAME}
    volumes:
      - hugo_data:/var/www/html/muffin_site
    restart: no
    networks:
      - inception

  chessgame:
    container_name: chessgame
    build: ./requirements/bonus/chessgame
    volumes:
      - chessgame_data:/var/www/html/chessgame
    restart: no
    networks:
      - inception

networks:
  inception:
    driver: bridge

volumes:
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ~/data/wordpress
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ~/data/mysql
  hugo_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ~/data/hugo
  chessgame_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ~/data/chessgame

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_admin_user:
    file: ../secrets/wp_admin_user.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user:
    file: ../secrets/wp_user.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt
  mysql_user:
    file: ../secrets/mysql_user.txt
  mysql_admin_email:
    file: ../secrets/mysql_admin_email.txt
  mysql_user_email:
    file: ../secrets/mysql_user_email.txt
  ftp_pass:
    file: ../secrets/ftp_pass.txt
